		<Center><h1>Funcion O</h1></Center>
	<section>
	<p>Use la función O, una de las funciones lógicas, para determinar si algunas condiciones de una prueba son VERDADERAS.</p>
<p>=O(A2>1,A2<100)
<br>Muestra VERDADERO si A2 es superior a 1 O es inferior a 100, de otro modo muestra FALSO.</br></p>
